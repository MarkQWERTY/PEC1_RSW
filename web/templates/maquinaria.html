{{define "content"}}
    <nav class="migas-pan" aria-label="Breadcrumb">
        <a href="/">Inicio</a>
        <span class="separador"><i class="fas fa-chevron-right"></i></span>
        <span class="actual">Maquinaria</span>
    </nav>

    <section id="maquinaria-list" class="seccion">
        <div class="cabecera-seccion">
            <h2>NUESTRA <span class="texto-destacado">MAQUINARIA</span></h2>
            <p>Ingeniería de vanguardia para el máximo aislamiento muscular.</p>
        </div>

        <ul class="contenido-seccion">
            {{range .Data}}
            <li class="tarjeta">
                <img src="{{.Imagen}}" alt="{{.Nombre}}" class="imagen-tarjeta">
                <div class="cuerpo-tarjeta">
                    <span class="item-resultado__tipo">{{.Marca}} | {{.Zona}}</span>
                    <h3 class="nombre-tarjeta">{{.Nombre}}</h3>
                    <p class="descripcion-tarjeta">{{.Descripcion}}</p>
                    <a href="/maquinaria-detalle?id={{.ID}}" class="boton-principal boton-bloque">Ficha Técnica</a>
                </div>
            </li>
            {{end}}
        </ul>
    </section>
{{end}}
