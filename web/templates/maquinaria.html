{{define "content"}}
            <nav class="migas-pan" aria-label="Breadcrumb">
                <a href="/">Inicio</a>
                <span class="separador"><i class="fas fa-chevron-right"></i></span>
                <span class="actual">Maquinaria</span>
            </nav>

            <section id="maquinaria">
                <div class="cabecera-seccion">
                    <h2>NUESTRO <span class="texto-destacado">ARSENAL</span></h2>
                    <p>Equipamiento biomecánico de primer nivel para resultados reales.</p>
                </div>

                <div class="contenido-seccion grid-4-cols">

                    {{range .}}
                    <div class="tarjeta">
                        <img src="{{.Imagen}}" alt="{{.Nombre}}" class="imagen-tarjeta"
                            loading="lazy">
                        <div class="cuerpo-tarjeta">
                            <span class="detalles-tarjeta">{{.Marca}}</span>
                            <h3 class="nombre-tarjeta">{{.Nombre}}</h3>
                            <span class="detalles-tarjeta">{{.Zona}}</span>
                            <a href="maquinaria-detalle.html?id={{.ID}}" class="boton-secundario boton-bloque"
                                style="margin-top: 1rem;">Saber más</a>
                        </div>
                    </div>
                    {{end}}

                </div>
            </section>

            <!-- Footer removed -->

        {{end}}
