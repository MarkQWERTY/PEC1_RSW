{{define "content"}}
    <nav class="migas-pan" aria-label="Breadcrumb">
        <a href="/">Inicio</a>
        <span class="separador"><i class="fas fa-chevron-right"></i></span>
        <a href="/maquinaria">Maquinaria</a>
        <span class="separador"><i class="fas fa-chevron-right"></i></span>
        <span class="actual">{{.Data.Nombre}}</span>
    </nav>

    <div class="detalle-entidad">
        <div class="detalle-grid">
            <div class="detalle-imagen">
                <img src="{{.Data.Imagen}}" alt="{{.Data.Nombre}}" class="img-fluida rounded shadow">
            </div>
            <div class="detalle-info">
                <span class="badget text-muted">{{.Data.Marca}} | {{.Data.Zona}}</span>
                <h2 class="detalle-titulo">{{.Data.Nombre}}</h2>
                <div class="detalle-seccion">
                    <h3>Descripción</h3>
                    <p>{{.Data.Descripcion}}</p>
                </div>
                <div class="detalle-seccion">
                    <h3>Beneficios Clave</h3>
                    <p>{{.Data.Beneficios}}</p>
                </div>
                <div class="detalle-acciones">
                    <a href="/maquinaria" class="boton-secundario"><i class="fas fa-arrow-left"></i> Volver al listado</a>
                    <a href="/login" class="boton-principal">Probar en Sala</a>
                </div>
            </div>
        </div>
    </div>
{{end}}
