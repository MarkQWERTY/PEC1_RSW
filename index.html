<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platinum Gym - Inicio</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="cabecera">
        <div class="cabecera__contenedor">
            <a href="index.html" class="cabecera__logo-enlace">
                <img src="img/logo_platinium.png" alt="Logo Platinum Gym" class="cabecera__logo-img">
            </a>
            <nav class="cabecera__nav">
                <a href="index.html" class="cabecera__enlace">Inicio</a>
                <a href="maquinaria.html" class="cabecera__enlace">Maquinaria</a>
                <a href="servicios.html" class="cabecera__enlace">Servicios</a>
                <a href="tienda.html" class="cabecera__enlace">Tienda</a>
                <a href="reglas.html" class="cabecera__enlace">Reglas</a>
                <a href="apuntate.html" class="cabecera__enlace cabecera__enlace--destacado">¡APÚNTATE!</a>
            </nav>
        </div>
    </header>

    <main class="principal">

        <section class="hero">
            <img src="img/banner.png" alt="Foto del gimnasio" class="hero__img">
        </section>

        <section class="seccion">
            <h2 class="seccion__titulo">Nuestros Locales</h2>
            <div class="seccion__contenido">
                <div class="tarjeta">
                    <img src="img/meco.jpg" alt="Local Meco" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Meco</h3>
                </div>
                <div class="tarjeta">
                    <img src="img/vallecas.jpg" alt="Local Vallecas" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Vallecas</h3>
                </div>
                <div class="tarjeta">
                    <img src="img/berlin.jpg" alt="Local Berlin" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Berlín</h3>
                </div>
                <div class="tarjeta">
                    <img src="img/tokyo.jpg" alt="Local Tokyo" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Tokyo</h3>
                </div>
                <div class="tarjeta">
                    <img src="img/chicago.jpg" alt="Local Chicago" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Chicago</h3>
                </div>
            </div>
        </section>

        <section class="seccion">
            <h2 class="seccion__titulo">Best Sellers</h2>
            <div class="seccion__contenido">
                <div class="tarjeta">
                    <img src="img/straps.jpg" alt="Straps" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Straps en 8</h3>
                </div>
                <div class="tarjeta">
                    <img src="img/pantalon.jpg" alt="Pantalon" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Pantalón Top</h3>
                </div>
                <div class="tarjeta">
                    <img src="img/chaqueta.jpg" alt="Chaqueta" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Chaqueta</h3>
                </div>
                <div class="tarjeta">
                    <img src="img/tanktop.jpg" alt="Tank Top" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Tank Top Básica</h3>
                </div>
                <div class="tarjeta">
                    <img src="img/botella.jpg" alt="Botella" class="tarjeta__img">
                    <h3 class="tarjeta__nombre">Botella Shaker</h3>
                </div>
            </div>
        </section>

    </main>

    <footer class="pie">
        <p class="pie__texto">&copy; 2026 Platinum Gym</p>
    </footer>

</body>

</html>
