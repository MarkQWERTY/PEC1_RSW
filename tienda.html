<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platinum Gym - Tienda</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="cabecera">
        <div class="cabecera__contenedor">
            <a href="index.html" class="cabecera__logo-enlace">
                <img src="img/logo_platinium.png" alt="Logo Platinum Gym" class="cabecera__logo-img">
            </a>
            <nav class="cabecera__nav">
                <a href="index.html" class="cabecera__enlace">Inicio</a>
                <a href="maquinaria.html" class="cabecera__enlace">Maquinaria</a>
                <a href="servicios.html" class="cabecera__enlace">Servicios</a>
                <a href="tienda.html" class="cabecera__enlace">Tienda</a>
                <a href="reglas.html" class="cabecera__enlace">Reglas</a>
                <a href="apuntate.html" class="cabecera__enlace cabecera__enlace--destacado">¡APÚNTATE!</a>
            </nav>
        </div>
    </header>

    <main class="principal">

        <section class="seccion">
            <h2 class="seccion__titulo">Nuestra Tienda</h2>
            <div class="seccion__contenido">

                <div class="producto">
                    <img src="img/straps.jpg" class="producto__img">
                    <div class="producto__info">
                        <h3 class="producto__nombre">Straps en 8</h3>
                        <p class="producto__precio">14,99 €</p>
                        <button class="producto__boton">Añadir al carrito</button>
                    </div>
                </div>

                <div class="producto">
                    <img src="img/pantalon.jpg" class="producto__img">
                    <div class="producto__info">
                        <h3 class="producto__nombre">Pantalón Top</h3>
                        <p class="producto__precio">34,99 €</p>
                        <button class="producto__boton">Añadir al carrito</button>
                    </div>
                </div>

                <div class="producto">
                    <img src="img/chaqueta.jpg" class="producto__img">
                    <div class="producto__info">
                        <h3 class="producto__nombre">Chaqueta</h3>
                        <p class="producto__precio">49,99 €</p>
                        <button class="producto__boton">Añadir al carrito</button>
                    </div>
                </div>

                <div class="producto">
                    <img src="img/tanktop.jpg" class="producto__img">
                    <div class="producto__info">
                        <h3 class="producto__nombre">Tank Top Básica</h3>
                        <p class="producto__precio">19,99 €</p>
                        <button class="producto__boton">Añadir al carrito</button>
                    </div>
                </div>

                <div class="producto">
                    <img src="img/botella.jpg" class="producto__img">
                    <div class="producto__info">
                        <h3 class="producto__nombre">Botella Shaker</h3>
                        <p class="producto__precio">9,99 €</p>
                        <button class="producto__boton">Añadir al carrito</button>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <footer class="pie">
        <p class="pie__texto">&copy; 2026 Platinum Gym</p>
    </footer>

</body>

</html>
